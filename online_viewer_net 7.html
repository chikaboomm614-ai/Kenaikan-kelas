<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenaikan Kelas 3C ke 4C</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Comic Sans MS", sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(180deg,#aee7ff,#dff6ff);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    color:#0099ff;
    margin-bottom:20px;
}

.cute{
    font-size:50px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:15px;
    background:#eef9ff;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:14px 25px;
    border:none;
    border-radius:15px;
    background:#00aaff;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#hasil{
    margin-top:25px;
}

.naik{
    color:#00aa55;
    animation:bounce 1s infinite;
}

.tidak{
    color:#ff4444;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.confetti{
    position:fixed;
    width:12px;
    height:12px;
    border-radius:50%;
    top:-20px;
    animation:jatuh linear forwards;
}

@keyframes jatuh{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="cute">🎓📚✨</div>

    <h1>Kenaikan Kelas 3C ➜ 4C</h1>

    <input type="text" id="nick" placeholder="Nama Panggilan">
    <input type="text" id="nama" placeholder="Nama Lengkap">

    <button onclick="cekKelulusan()">Lihat Hasil</button>

    <div id="hasil"></div>
</div>

<script>
function confetti(){
    for(let i=0;i<100;i++){
        const c=document.createElement("div");
        c.className="confetti";

        c.style.left=Math.random()*100+"vw";
        c.style.background=
        `hsl(${Math.random()*360},100%,50%)`;

        c.style.animationDuration=
        (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

function cekKelulusan(){

    let nick=document.getElementById("nick").value;
    let nama=document.getElementById("nama").value;

    if(!nick || !nama){
        alert("Isi nama terlebih dahulu!");
        return;
    }

    let hasil=document.getElementById("hasil");

    let naik=Math.random() > 0.3;

    if(naik){

        hasil.innerHTML=`
        <h2 class="naik">🎉 SELAMAT! 🎉</h2>
        <br>
        <h3>${nick}</h3>
        <p>${nama}</p>
        <br>
        <h2>Naik dari Kelas 3C ke 4C 🥳</h2>
        <p>Terus semangat belajar dan raih prestasi ya! ⭐</p>
        `;

        confetti();

    }else{

        hasil.innerHTML=`
        <h2 class="tidak">😢 BELUM NAIK KELAS</h2>
        <br>
        <h3>${nick}</h3>
        <p>${nama}</p>
        <br>
        <p>Jangan menyerah ya! 💙</p>
        <p>Setiap orang punya waktunya masing-masing untuk berhasil.</p>
        <p>Tetap semangat, rajin belajar, dan coba lagi tahun depan! 🌟</p>
        `;
    }
}
</script>

</body>
</html>
